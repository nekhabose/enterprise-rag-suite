name: Claude Code

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  claude:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run Claude Code Action
        uses: anthropics/claude-code-action@main
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
